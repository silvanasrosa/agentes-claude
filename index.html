<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vitrine de Carrosseis - Silvana Rosa</title>
  <style>
    :root {
      --page: #f4efe5;
      --ink: #07393a;
      --muted: #6f7772;
      --surface: #fffdf8;
      --line: #e5dccb;
      --gold: #c49a45;
      --teal: #27b8b4;
      --posted: #0d6b52;
      --approved: #8a6a16;
      --pending: #0d5d73;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: var(--page);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .shell {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 42px 0 56px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      max-width: 760px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(34px, 6vw, 68px);
      font-weight: 500;
      line-height: 0.95;
      letter-spacing: 0;
    }

    .eyebrow {
      margin-bottom: 10px;
      color: var(--teal);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .summary {
      max-width: 300px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 22px;
      padding-top: 28px;
    }

    .card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 16px 36px rgba(7, 57, 58, 0.08);
    }

    .thumb {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      background: #ede4d5;
    }

    .content {
      padding: 18px;
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 10px;
      border-radius: 999px;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }

    .status.postado {
      background: var(--posted);
    }

    .status.aprovado {
      background: var(--approved);
    }

    .status.em-aprovacao {
      background: var(--pending);
    }

    .date {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    h2 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 29px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: 0;
    }

    .description {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid var(--ink);
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
    }

    .button.primary {
      border-color: var(--ink);
      background: var(--ink);
      color: #fff;
    }

    .button.secondary {
      border-color: var(--line);
      color: var(--ink);
    }

    @media (max-width: 720px) {
      .shell {
        width: min(100vw - 24px, 420px);
        padding: 28px 0 36px;
      }

      header {
        display: block;
      }

      .summary {
        margin-top: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <p class="eyebrow">Previews Instagram</p>
        <h1>Vitrine de carrosseis</h1>
      </div>
      <p class="summary">Home de aprovacao dos carrosseis da Silvana Rosa, com previews individuais e status de publicacao.</p>
    </header>

    <section class="grid" aria-label="Lista de carrosseis">
      <article class="card">
        <img class="thumb" src="carrosseis/agentes-claude/slide-01.png" alt="Capa do carrossel Agentes Claude">
        <div class="content">
          <div class="meta">
            <span class="status postado">postado</span>
            <span class="date">12/06/2026</span>
          </div>
          <h2>Agentes Claude</h2>
          <p class="description">Ecossistema de agentes com alma para mentoras, criado no formato 4:5 e aprovado para publicacao.</p>
          <div class="links">
            <a class="button primary" href="previews/agentes-claude.html">Abrir preview</a>
            <a class="button secondary" href="https://www.instagram.com/p/DZe1Lx5DbrO/" target="_blank" rel="noreferrer">Ver post</a>
          </div>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
